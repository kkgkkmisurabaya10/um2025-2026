<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Soal UM KKMI Surabaya 10</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f4f7f6; }
        .hidden { display: none !important; }
        .card-custom { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        .header-bg { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; border-radius: 15px 15px 0 0; }
        .logo-img { width: 80px; height: auto; margin-bottom: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Bank Soal KKMI</a>
        <div class="d-flex">
            <button id="btnNavAdmin" class="btn btn-outline-light btn-sm" onclick="showLoginView()">Login Admin</button>
            <button id="btnNavLogout" class="btn btn-danger btn-sm hidden" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Logout Admin</button>
        </div>
    </div>
</nav>

<div id="dashboardView" class="container pb-5">
    <div class="text-center mb-4">
        <img src="https://lh3.googleusercontent.com/d/17PFUvnIUrEjXgMJkiAA0D1pejOgJkKfS" alt="Logo Instansi" class="logo-img" onerror="this.src='https://via.placeholder.com/80?text=Logo'">
        <h3>Bank Soal Ujian Madrasah</h3>
        <p class="text-muted">KKMI Surabaya 10</p>
    </div>

    <div id="adminBanner" class="alert alert-success hidden text-center">
        <i class="fas fa-user-shield"></i> <strong>Mode Admin Aktif:</strong> Anda dapat mengelola semua arsip yang masuk.
    </div>

    <div id="uploadSection" class="card card-custom mb-4">
        <div class="card-header header-bg py-3">
            <h5 class="mb-0"><i class="fas fa-upload"></i> Form Pengumpulan Berkas</h5>
        </div>
        <div class="card-body">
            <form id="uploadForm">
                <div class="alert alert-info text-center py-2"><small>Mendukung format PDF atau Word (.doc, .docx).</small></div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Email Anda <small class="text-danger">*</small></label>
                        <input type="email" id="email" class="form-control" placeholder="contoh@gmail.com" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Nama Lengkap <small class="text-danger">*</small></label>
                        <input type="text" id="nama" class="form-control" placeholder="Nama Anda" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Mata Pelajaran <small class="text-danger">*</small></label>
                        <input type="text" id="mapel" class="form-control" placeholder="Cth: Matematika" required>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Kisi-kisi (PDF/Word)</label>
                        <input type="file" id="fileKisi" class="form-control" accept=".pdf, .doc, .docx">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Soal (PDF/Word)</label>
                        <input type="file" id="fileSoal" class="form-control" accept=".pdf, .doc, .docx">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label>Kunci Jawaban (PDF/Word)</label>
                        <input type="file" id="fileKunci" class="form-control" accept=".pdf, .doc, .docx">
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100" id="btnUpload">
                    <i class="fas fa-paper-plane"></i> Kirim Berkas
                </button>
            </form>
        </div>
    </div>

    <div class="card card-custom">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0"><i class="fas fa-table"></i> Riwayat Arsip</h5>
        </div>
        <div class="card-body table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Waktu</th>
                        <th>Pengirim</th>
                        <th>Mata Pelajaran</th>
                        <th class="text-center">Kisi-kisi</th>
                        <th class="text-center">Soal</th>
                        <th class="text-center">Kunci</th>
                        <th class="text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr><td colspan="7" class="text-center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="loginView" class="container d-flex justify-content-center align-items-center hidden" style="min-height: 80vh;">
    <div class="card card-custom w-100" style="max-width: 400px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="fas fa-user-shield fa-3x text-dark mb-3"></i>
                <h4>Login Admin</h4>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 mb-2">Masuk</button>
                <button type="button" class="btn btn-outline-secondary w-100" onclick="showDashboardView()">Batal</button>
            </form>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzDcVDudAz1RE_6C7d2TQO7iRVj2gdYmEq0VrC4kD97x-1aCFwmNQ5_VPnuE2QQkbLPBw/exec';

    let adminUser = JSON.parse(localStorage.getItem('admin_bank_soal')) || null;
    let savedEmail = localStorage.getItem('user_email_soal') || null;
    let savedNama = localStorage.getItem('user_nama_soal') || null;

    function init() {
        showDashboardView();
        if(savedEmail) document.getElementById('email').value = savedEmail;
        if(savedNama) document.getElementById('nama').value = savedNama;

        if (adminUser) {
            document.getElementById('btnNavAdmin').classList.add('hidden');
            document.getElementById('btnNavLogout').classList.remove('hidden');
            document.getElementById('adminBanner').classList.remove('hidden');
            fetchData(null, 'admin'); 
        } else {
            document.getElementById('btnNavAdmin').classList.remove('hidden');
            document.getElementById('btnNavLogout').classList.add('hidden');
            document.getElementById('adminBanner').classList.add('hidden');
            if(savedEmail) fetchData(savedEmail, 'user');
            else document.getElementById('dataTableBody').innerHTML = '<tr><td colspan="7" class="text-center">Silakan kirim file.</td></tr>';
        }
    }

    function showLoginView() {
        document.getElementById('dashboardView').classList.add('hidden');
        document.getElementById('loginView').classList.remove('hidden');
    }

    function showDashboardView() {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('dashboardView').classList.remove('hidden');
    }

    async function callAPI(payload) {
        try {
            let response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            return await response.json();
        } catch (error) {
            Swal.fire('Error', 'Koneksi gagal.', 'error');
            return null;
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        Swal.fire({ title: 'Memeriksa...', didOpen: () => Swal.showLoading() });
        let req = await callAPI({
            action: 'login',
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        });
        if (req && req.success) {
            localStorage.setItem('admin_bank_soal', JSON.stringify(req.data));
            adminUser = req.data;
            Swal.fire('Berhasil', 'Selamat datang Admin', 'success');
            init(); 
        } else {
            Swal.fire('Gagal', req ? req.message : 'Login gagal', 'error');
        }
    });

    function logoutAdmin() {
        localStorage.removeItem('admin_bank_soal');
        adminUser = null;
        init();
    }

    async function fetchData(email, role) {
        document.getElementById('dataTableBody').innerHTML = '<tr><td colspan="7" class="text-center"><i class="fas fa-spinner fa-spin"></i> Memuat...</td></tr>';
        let req = await callAPI({ action: 'get_data', email: email, role: role });
        if (req && req.success) {
            let html = '';
            if(req.data.length === 0) {
                html = '<tr><td colspan="7" class="text-center">Belum ada berkas.</td></tr>';
            } else {
                req.data.forEach(row => {
                    // Cek tipe file untuk ikon yang sesuai
                    const getIcon = (url) => {
                      if(!url || url.includes("Error")) return `<span class="text-muted">-</span>`;
                      let iconClass = url.toLowerCase().includes('.doc') ? 'fa-file-word text-primary' : 'fa-file-pdf text-danger';
                      return `<a href="${url}" target="_blank" class="btn btn-sm btn-outline-secondary"><i class="fas ${iconClass}"></i></a>`;
                    };

                    html += `<tr>
                        <td><small>${row.waktu}</small></td>
                        <td><strong>${row.nama_pengirim}</strong>${role === 'admin' ? `<br><small>${row.email}</small>` : ''}</td>
                        <td>${row.mata_pelajaran}</td>
                        <td class="text-center">${getIcon(row.kisi_url)}</td>
                        <td class="text-center">${getIcon(row.soal_url)}</td>
                        <td class="text-center">${getIcon(row.kunci_url)}</td>
                        <td class="text-center">
                            <button onclick="deleteData('${row.id_arsip}')" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
                });
            }
            document.getElementById('dataTableBody').innerHTML = html;
        }
    }

    function deleteData(id_arsip) {
        Swal.fire({
            title: 'Hapus?',
            text: "Data akan dihapus permanen.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Hapus'
        }).then(async (result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: 'Menghapus...', didOpen: () => Swal.showLoading() });
                let req = await callAPI({ action: 'delete', id_arsip: id_arsip });
                if (req && req.success) {
                    Swal.fire('Terhapus!', '', 'success');
                    init();
                }
            }
        });
    }

    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        let fK = document.getElementById('fileKisi').files;
        let fS = document.getElementById('fileSoal').files;
        let fJ = document.getElementById('fileKunci').files;

        if (fK.length === 0 && fS.length === 0 && fJ.length === 0) {
            Swal.fire('Peringatan', 'Lampirkan minimal 1 file.', 'warning');
            return;
        }

        const btn = document.getElementById('btnUpload');
        btn.disabled = true;
        Swal.fire({ title: 'Mengunggah...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        try {
            let emailVal = document.getElementById('email').value;
            let namaVal = document.getElementById('nama').value;
            
            let req = await callAPI({
                action: 'upload',
                email: emailVal,
                nama: namaVal,
                mata_pelajaran: document.getElementById('mapel').value,
                file_kisi: fK.length > 0 ? await getBase64(fK[0]) : null,
                file_soal: fS.length > 0 ? await getBase64(fS[0]) : null,
                file_kunci: fJ.length > 0 ? await getBase64(fJ[0]) : null
            });

            if(req && req.success) {
                Swal.fire('Sukses!', 'Berkas terkirim.', 'success');
                localStorage.setItem('user_email_soal', emailVal);
                localStorage.setItem('user_nama_soal', namaVal);
                document.getElementById('uploadForm').reset();
                init();
            }
        } catch (err) {
            Swal.fire('Error', 'Gagal upload.', 'error');
        } finally {
            btn.disabled = false;
        }
    });

    window.onload = init;
</script>
</body>
</html>
